spring:
  application:
    name: libr

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/lirb?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database: mysql
    show-sql: true
    hibernate:
      ddl-auto: update
      dialect: org.hibernate.dialect.MySQL5Dialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8081

app:
  jwt:
    secret: ${JWT_SECRET:bXlMaWJyYXJ5QXBwU3VwZXJTZWNyZXRKd3RLZXlGb3JTaWduaW5nMjAyNiE=}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000

  otp:
    expiration: 600
  mail:
    from: ${MAIL_FROM:noreply@libr.com}
